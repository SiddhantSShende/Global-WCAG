# Local dev stack for the Accessibility Compliance Audit Platform.
# Run from repo root:  docker compose -f docker/docker-compose.yml up -d
#
# Broker uses Valkey (BSD) instead of Redis 8 (AGPLv3) to avoid copyleft
# exposure for a hosted product. The Python `redis` client speaks to it.
name: a11y-audit

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: a11y
      POSTGRES_PASSWORD: a11y
      POSTGRES_DB: a11y
    ports: ["5432:5432"]
    volumes: ["postgres-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U a11y"]
      interval: 5s
      timeout: 3s
      retries: 10

  broker:
    image: valkey/valkey:8-alpine
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  objectstore:
    # Pinned MinIO (AGPLv3). Swap for Garage/SeaweedFS if AGPL is a concern.
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio-data:/data"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Creates the artifacts bucket on startup, then exits.
  createbucket:
    image: minio/mc:latest
    depends_on:
      objectstore:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://objectstore:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/a11y-artifacts;
      mc anonymous set none local/a11y-artifacts;
      exit 0;
      "

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    env_file: [../.env]
    environment:
      DATABASE_URL: postgresql+psycopg2://a11y:a11y@postgres:5432/a11y
      REDIS_URL: redis://broker:6379/0
      S3_ENDPOINT: http://objectstore:9000
      USE_CELERY: "true"
    command: ["uvicorn", "backend.app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      broker: { condition: service_healthy }
      objectstore: { condition: service_healthy }

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.tools   # worker needs browsers + engines + recon
    env_file: [../.env]
    environment:
      DATABASE_URL: postgresql+psycopg2://a11y:a11y@postgres:5432/a11y
      REDIS_URL: redis://broker:6379/0
      S3_ENDPOINT: http://objectstore:9000
    # prefork works here because the worker runs on Linux (NOT native Windows).
    command: ["celery", "-A", "backend.app.worker.celery_app", "worker", "-l", "info", "--concurrency=2"]
    depends_on:
      postgres: { condition: service_healthy }
      broker: { condition: service_healthy }
      objectstore: { condition: service_healthy }

volumes:
  postgres-data:
  minio-data:
